# Production Nginx configuration for devops-tsacademy.com
# This file is deployed by GitHub Actions, not Ansible

server {
    listen 80;
    server_name devops-tsacademy.com www.devops-tsacademy.com;
    
    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Certbot challenge (for renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name devops-tsacademy.com;

    # SSL certificates (installed by Certbot initially)
    ssl_certificate /etc/letsencrypt/live/devops-tsacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-tsacademy.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/devops-tsacademy.com/chain.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root directory (where GitHub Actions deploys)
    root /var/www/taskapp;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json;

    # Frontend - React SPA
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets with hash in filename (1 year)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Don't cache HTML (always fresh)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache";
        }
    }

    # Backend API proxy
    location /api/ {
        proxy_pass https://api.devops-tsacademy.com/api/; 
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check for monitoring
    location /health {
        access_log off;
        return 200 "frontend-healthy\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
