# Container Nginx for the TaskApp SPA (used INSIDE the frontend image).
#
#  * Serves the built React app on :80
#  * Reverse-proxies /api/  ->  the backend CONTAINER, addressed by its Compose
#    SERVICE NAME "backend" (slide 24: service name == in-network DNS).
#
# TLS is NOT terminated here. In this lab the container speaks plain HTTP on :80;
# put HTTPS at a host-level proxy / load balancer (Caddy, Traefik, certbot) in
# front if you need it. The old host-deploy file `nginx-production.conf` (with
# Let's Encrypt) is kept in the repo as a LEGACY reference only.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Lightweight health endpoint for the Docker HEALTHCHECK / Portainer.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API -> backend container.
    # "backend" is the Compose service name; Docker's embedded DNS resolves it to
    # the backend container's current IP. NEVER hardcode an IP here.
    #
    # The simple form below resolves "backend" when Nginx starts, which is why the
    # frontend `depends_on` the backend being healthy in compose. If you need
    # Nginx to survive the backend getting a NEW IP on restart, switch to the
    # resolver form:
    #     resolver 127.0.0.11 valid=30s;      # Docker's embedded DNS
    #     set $upstream http://backend:5000;
    #     proxy_pass $upstream$request_uri;
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # SPA routing: any unmatched path returns index.html so client-side routing
    # (React Router) works on refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; never cache index.html.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
