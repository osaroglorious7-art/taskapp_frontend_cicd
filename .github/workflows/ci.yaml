name: Frontend CI

# CI = validate proposed changes. Runs on PULL REQUESTS into main.
# Lint, type-check, tests, and a build sanity-check gate the merge.
on:
  pull_request:
    branches: [main]
    paths: ['src/**', 'package.json', 'package-lock.json', 'tsconfig*.json', 'vite.config.ts', 'index.html', 'Dockerfile', 'docker/**']
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  quality:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build (sanity check — same as the Docker build stage)
        run: npm run build
        env:
          VITE_API_URL: /api
