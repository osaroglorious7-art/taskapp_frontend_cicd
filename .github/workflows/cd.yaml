name: Frontend CD

# CD = deliver. Runs on PUSH to main (after a PR merged and CI passed).
# Builds the SPA into an Nginx image, pushes it to GHCR tagged with the commit
# SHA, then bumps FRONTEND_TAG in the deploy repo so Portainer redeploys.
on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json', 'package-lock.json', 'tsconfig*.json', 'vite.config.ts', 'index.html', 'Dockerfile', 'docker/**']
  workflow_dispatch:

env:
  IMAGE_NAME: taskapp-frontend

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner (GHCR requires lowercase)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deploy-repo:
    name: Bump tag in deploy repo (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ts-a-devops/taskapp_deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
      - name: Update FRONTEND_TAG and push
        run: |
          NEW="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s/^FRONTEND_TAG=.*/FRONTEND_TAG=${NEW}/" .env
          git config user.name  "taskapp-ci[bot]"
          git config user.email "taskapp-ci@users.noreply.github.com"
          git add .env
          git commit -m "deploy(frontend): ${NEW}" || { echo "No tag change"; exit 0; }
          # Backend and frontend CD can race on this repo — rebase + retry.
          for i in 1 2 3; do
            git push && break
            echo "push rejected (concurrent deploy bump) — rebasing, attempt $i"
            git pull --rebase && sleep 2
          done
      - name: Trigger Portainer redeploy (webhook)
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then curl -fsS -X POST "$WEBHOOK" && echo "webhook fired"; else echo "PORTAINER_WEBHOOK_URL not set — relying on deploy-repo webhook"; fi
